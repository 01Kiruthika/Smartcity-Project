<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        header content
    </header>
    <aside>

        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="#">Category</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="#">Logout</a></li>
        </ul>

    </aside>
    <main>
        <h1>Products</h1>

        <div class="wrapper">
            <div class="form-box">
                <h2 class="title">Product Form</h2>
                <div class="card">
                    <input type="hidden" id="productId">
                    <div class="inner-card">
                        <input type="text" id="img-url" placeholder="Enter Image URL" />
                        <span id="urlError" class="error"></span>
                    </div>

                    <div class="inner-card">
                        <input type="url" id="prod-name" placeholder="Enter Product Name" />
                        <span id="prodError" class="error"></span>
                    </div>

                    <div class="inner-card">
                        <input type="text" id="category" placeholder="Enter Category" />
                        <span id="categoryError" class="error"></span>
                    </div>

                    <div class="inner-card">
                        <input type="number" id="price" placeholder="Enter Price" />
                        <span id="priceError" class="error"></span>
                    </div>

                    <div class="inner-card">
                        <input type="number" id="stock" placeholder="Enter Stock" />
                        <span id="stockError" class="error"></span>
                    </div>

                    <div class="inner-card">
                        <input type="number" id="offer" placeholder="Enter Offer Price" />
                        <span id="offerError" class="error"></span>
                    </div>
                </div>

                <button onclick="productForm()" id="submitBtn">SUBMIT</button>
                <button onclick="updateForm()" id="updateBtn" style="display: none;">Update</button>
            </div>
            <div class="table-div">
                <table border="1">
                    <thead>
                        <tr>
                            <th>Product Id</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Offer</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productBody">
                        <tr>
                            <td>1</td>
                            <td>1</td>
                            <td>1</td>
                            <td>1</td>
                            <td>1</td>
                            <td>1</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
    <footer>
        footer content
    </footer>


    <script>
        let isImg, isProduct, isCategory, isStock, isPrice, isOffer = false;

        let ProductLists = [];

        let loadData = () => {
            let plist = JSON.parse(localStorage.getItem("plist"))

            // console.log(plist);
            let trow = '';

            if (plist.length > 0) {
                plist.forEach((ele) => {
                    trow += `
                         <tr>
                            <td >${ele.productId}</td>
                            <td>${ele.productName}</td>
                            <td>${ele.category}</td>
                            <td>${ele.price}</td>
                            <td>${ele.stock}</td>
                            <td>${ele.offer}</td>
                            <td>
                              <button type="button" onclick="setSelectedPro(${ele.productId})">Update</button>    
                              <button type="button" onclick="deletePro(${ele.productId})">Delete</button>    
                            </td>
                        </tr>
                `
                })
            } else {
                trow = `<tr>
                            <td colspan="7" align="center">No Record Found</td>
                            
                        </tr>`
            }
            // console.log(trow);

            document.querySelector("#productBody").innerHTML = trow

        }

        let setSelectedPro = (proId) => {

            let plist = JSON.parse(localStorage.getItem("plist"))

            let fpl = plist.filter(ele => ele.productId == proId)
            // console.log(fpl);
            let [singleProduct] = fpl
            // console.log(singleProduct);
            document.querySelector("#img-url").value = singleProduct.img_url
            document.querySelector("#prod-name").value = singleProduct.productName
            document.querySelector("#category").value = singleProduct.category
            document.querySelector("#price").value = singleProduct.price
            document.querySelector("#stock").value = singleProduct.stock
            document.querySelector("#offer").value = singleProduct.offer

            document.querySelector("#productId").value = singleProduct.productId

            document.querySelector("#updateBtn").style.display = "block"
            document.querySelector("#submitBtn").style.display = "none"
        }


        let productForm = () => {
            let img_url = document.querySelector("#img-url")
            let prod_name = document.querySelector("#prod-name")
            let category = document.querySelector("#category")
            let price = document.querySelector("#price")
            let stock = document.querySelector("#stock")
            let offer = document.querySelector("#offer")

            let imgerror = document.querySelector("#urlError");
            let prodError = document.querySelector("#prodError");
            let categoryError = document.querySelector("#categoryError");
            let priceError = document.querySelector("#priceError");
            let stockError = document.querySelector("#stockError");
            let offerError = document.querySelector("#offerError");

            // start
            // debugger;
            if (img_url.value === "") {
                imgerror.innerText = "Image url cann't empty";
                isImg = false;
            } else {
                imgerror.innerText = ""
                isImg = true
            }

            // end


            if (prod_name.value === "") {
                prodError.innerText = "Product Name cann't empty";
                isProduct = false
            } else {
                prodError.innerText = ""
                isProduct = true
            }


            if (category.value === "") {
                categoryError.innerText = "Category Name cann't empty";
                isCategory = false
            } else {
                categoryError.innerText = ""
                isCategory = true
            }


            if (price.value === "") {
                priceError.innerText = "Price  cann't empty";
                isPrice = false
            } else {
                priceError.innerText = ""
                isPrice = true
            }


            if (stock.value === "") {
                stockError.innerText = "Stock  cann't empty";
                isStock = false
            } else {
                stockError.innerText = ""
                isStock = true
            }

            if (offer.value === "") {
                offerError.innerText = "Offer  cann't empty";
                isOffer = false
            } else {
                offerError.innerText = ""

                isOffer = true
            }
            if (isImg && isProduct && isCategory && isPrice && isStock && isOffer) {
                debugger;
                let products = {
                    productId: Date.now(),
                    productName: prod_name.value,
                    category: category.value,
                    price: price.value,
                    offer: offer.value,
                    stock: stock.value,
                    img_url: img_url.value

                }
                ProductLists.push(products)
                localStorage.setItem("plist", JSON.stringify(ProductLists))
                prod_name.value = ""
                category.value = ""
                price.value = ""
                loadData()
            }
        }

        loadData()


        let deletePro = (proId) => {

            let c = confirm("do you want to Delete Product id?")

            if (c) {
                let plist = JSON.parse(localStorage.getItem("plist"))

                let fpl = plist.filter((ele) => {
                    if (ele.productId != proId) {
                        return ele
                    }
                })


                localStorage.setItem("plist", JSON.stringify(fpl))
                loadData()
            } else {
                alert("your product is Safe")
            }


        }


        let updateForm = () => {
            let img_url = document.querySelector("#img-url")
            let productId = document.querySelector("#productId")
            let prod_name = document.querySelector("#prod-name")
            let category = document.querySelector("#category")
            let price = document.querySelector("#price")
            let stock = document.querySelector("#stock")
            let offer = document.querySelector("#offer")

            let products = {
                productId: Number(productId.value),
                productName: prod_name.value,
                category: category.value,
                price: price.value,
                offer: offer.value,
                stock: stock.value,
                img_url: img_url.value

            }

            let plist = JSON.parse(localStorage.getItem("plist"))

            let upl = plist.map((ele) => {
                if (ele.productId == products.productId) {
                    return products;
                } else {
                    return ele;
                }
            })



            // localStorage.setItem("plist",)

            console.log(upl);
            localStorage.setItem("plist", JSON.stringify(upl))

            loadData();


        }
    </script>

</body>

</html>s
