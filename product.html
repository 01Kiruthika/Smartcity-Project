<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="company-name">

            <!-- <h2>Home</h2>
            <h2>Contact</h2> -->
            <label for="click-bars">
                <i class="fa fa-bars" aria-hidden="true"></i>
            </label>
        </div>
    </header>


    <input type="checkbox" id="click-bars">
    <aside>
        <div class="menu">
            <div class="admin-logo">
                <i class="fa fa-user-circle-o" aria-hidden="true"></i>
            </div>
            <div class="admin-options">
                <ul>
                    <li><a href="index.html"><i class="fa fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="category.html"><i class="fa fa-th-list"></i> Category</a></li>
                    <li><a href="product.html"><i class="fa fa-cubes"></i> Products</a></li>
                    <li><a href="#"><i class="fa fa-star"></i> Review</a></li>
                    <li><a href="#"><i class="fa fa-sign-out"></i> Logout</a></li>
                </ul>
            </div>

        </div>
    </aside>


    <main>
        <h1>Products</h1>
        <div class="product-form">
            <form action="">
                <label for="">Enter Product Image URL:</label><br>
                <input type="url" id="url"><br>
                <span id="urlerror"></span><br>


                <label for="">Enter Product Name:</label><br>
                <input type="text" id="PName"><br>
                <span id="nameerror"></span><br>


                <label for="">Enter price:</label><br>
                <input type="number" id="price"><br>
                <span id="Priceerror"></span><br>


                <label for="">Enter Stock:</label><br>
                <input type="number" id="stock"><br>
                <span id="Stockerror"></span><br>


                <label for="">Enter Offer:</label><br>
                <input type="number" id="offer"><br>
                <span id="Offerror"></span><br>

                <div class="Pro-btn">
                    <button type="submit" onclick="sub()" class="pbtn">Submit</button>

                </div>
            </form>
        </div>


    </main>
    <footer>
        footer
    </footer>



    <script src="script/script.js"></script>
</body>

</html>
