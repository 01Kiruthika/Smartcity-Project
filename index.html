<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="company-name">

            <!-- <h2>Home</h2>
            <h2>Contact</h2> -->
            <label for="click-bars">
                <i class="fa fa-bars" aria-hidden="true"></i>
            </label>
        </div>
    </header>


    <input type="checkbox" id="click-bars">
    <aside>
        <div class="menu">
            <div class="admin-logo">
                <i class="fa fa-user-circle-o" aria-hidden="true"></i>
            </div>
            <div class="admin-options">
                <ul>
                    <li><a href="index.html"><i class="fa fa-dashboard"></i> Dashboard</a></li>
                    <li><a href="category.html"><i class="fa fa-th-list"></i> Category</a></li>
                    <li><a href="product.html"><i class="fa fa-cubes"></i> Products</a></li>
                    <li><a href="#"><i class="fa fa-star"></i> Review</a></li>
                    <li><a href="#"><i class="fa fa-sign-out"></i> Logout</a></li>
                </ul>
            </div>

        </div>
    </aside>


    <main>
        <h1>Dashboard</h1>

        <section class="container">
            <div class="box box1">
                <div class="head">
                    <div class="left">
                        <h1>150</h1>
                        <p>New Products</p>
                    </div>
                    <div class="right">
                        <i class="fa fa-shopping-bag" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="foot">
                    <a href="#">More info </a>
                </div>
            </div>
            <div class="box box2">
                <div class="head">
                    <div class="left">
                        <h1>53%</h1>
                        <p>Bounce Rate</p>
                    </div>
                    <div class="right">
                        <i class="fa fa-signal" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="foot">
                    <a href="#">More info </a>
                </div>
            </div>
            <div class="box box3">
                <div class="head">
                    <div class="left">
                        <h1>44</h1>
                        <p>User Registrations</p>
                    </div>
                    <div class="right">
                        <i class="fa fa-user" aria-hidden="true"></i>
                    </div>
                </div>
                <div class="foot">
                    <a href="#">More info </a>
                </div>
            </div>
            <div class="box box4">
                <div class="head">
                    <div class="left">
                        <h1>65</h1>
                        <p>Unique Visitors</p>
                    </div>
                    <div class="right">
                        <i class="fa fa-pie-chart" aria-hidden="true"></i>

                    </div>
                </div>
                <div class="foot">
                    <a href="#">More info </a>
                </div>
            </div>

        </section>
    </main>
    <footer>
        footer
    </footer>

</body>

</html>
